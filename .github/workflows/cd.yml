name: CD — Despliegue PRE y PRO

# Se dispara cuando se hace merge a main (evento push en rama protegida)
on:
  push:
    branches:
      - main

jobs:
 # ─────────────────────────────────────────────
  # JOB 0: Obtención dinámica de IPs desde Terraform Cloud
  # ─────────────────────────────────────────────
  resolver-ips:
    name: Obtener IPs desde Terraform Cloud
    runs-on: ubuntu-latest
    environment: pro
    outputs:
      ip_pre: ${{ steps.get_ips.outputs.ip_pre }}
      ip_pro: ${{ steps.get_ips.outputs.ip_pro }}
    steps:
      - name: Consultar API de Terraform Cloud
        id: get_ips
        env:
          TF_TOKEN: ${{ secrets.TF_API_TOKEN }}
        run: |
          echo "=== LISTANDO WORKSPACES DE LA ORGANIZACIÓN ==="
          
          # Descargamos todos los workspaces de la organización de una sola vez
          WORKSPACES_JSON=$(curl -s \
            --header "Authorization: Bearer $TF_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/ecoanalyzer-org/workspaces")

          # Validamos si la respuesta es un error de permisos o token
          if echo "$WORKSPACES_JSON" | jq -e '.errors' >/dev/null 2>&1; then
            echo "❌ Error de la API de Terraform:"
            echo "$WORKSPACES_JSON" | jq .
            exit 1
          fi

          echo "=== BUSCANDO ID DE WORKSPACE PRE ==="
          # Buscamos el workspace cuyo nombre contenga 'pre' (ignorando mayúsculas/minúsculas)
          WORKSPACE_PRE_ID=$(echo "$WORKSPACES_JSON" | jq -r '.data[] | select(.attributes.name | ascii_downcase | contains("pre")) | .id' | head -n 1)
          WORKSPACE_PRE_NAME=$(echo "$WORKSPACES_JSON" | jq -r ".data[] | select(.id == \"$WORKSPACE_PRE_ID\") | .attributes.name")

          if [ -z "$WORKSPACE_PRE_ID" ] || [ "$WORKSPACE_PRE_ID" == "null" ]; then
            echo "❌ No se encontró ningún workspace que contenga la palabra 'pre'."
            echo "Nombres de tus workspaces disponibles en Terraform Cloud:"
            echo "$WORKSPACES_JSON" | jq -r '.data[].attributes.name'
            exit 1
          fi
          echo "Encontrado el Workspace PRE: '$WORKSPACE_PRE_NAME' con ID: $WORKSPACE_PRE_ID"

          echo "=== BUSCANDO ID DE WORKSPACE PRO ==="
          # Buscamos el workspace cuyo nombre contenga 'pro' (ignorando mayúsculas/minúsculas)
          WORKSPACE_PRO_ID=$(echo "$WORKSPACES_JSON" | jq -r '.data[] | select(.attributes.name | ascii_downcase | contains("pro")) | .id' | head -n 1)
          WORKSPACE_PRO_NAME=$(echo "$WORKSPACES_JSON" | jq -r ".data[] | select(.id == \"$WORKSPACE_PRO_ID\") | .attributes.name")

          if [ -z "$WORKSPACE_PRO_ID" ] || [ "$WORKSPACE_PRO_ID" == "null" ]; then
            echo "❌ No se encontró ningún workspace que contenga la palabra 'pro'."
            exit 1
          fi
          echo "Encontrado el Workspace PRO: '$WORKSPACE_PRO_NAME' con ID: $WORKSPACE_PRO_ID"


          echo "=== EXTRAENDO IPS DESDE LOS ESTADOS ==="
          
          # Extraer IP de PRE
          IP_PRE=$(curl -s \
            --header "Authorization: Bearer $TF_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/$WORKSPACE_PRE_ID/current-state-version-outputs" \
            | jq -r '.. | objects | select(.name == "vm_public_ip") | .value' | tr -d '"')

          # Extraer IP de PRO
          IP_PRO=$(curl -s \
            --header "Authorization: Bearer $TF_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/$WORKSPACE_PRO_ID/current-state-version-outputs" \
            | jq -r '.. | objects | select(.name == "vm_public_ip") | .value' | tr -d '"')


          echo "=== VALIDACIÓN FINAL ==="
          echo "-> IP PRE extraída: [${IP_PRE}]"
          echo "-> IP PRO extraída: [${IP_PRO}]"

          if [ -z "$IP_PRE" ] || [ -z "$IP_PRO" ]; then
            echo "❌ Error Crítico: Las IPs se leyeron vacías."
            echo "Comprueba que la máquina se haya creado en Azure y que tengas el 'output \"vm_public_ip\"' en tu código de Terraform."
            exit 1
          fi

          # Exportar hacia los siguientes Jobs
          echo "ip_pre=${IP_PRE}" >> $GITHUB_OUTPUT
          echo "ip_pro=${IP_PRO}" >> $GITHUB_OUTPUT
          echo "✅ Proceso completado con éxito de forma automática."
  # ─────────────────────────────────────────────
  # JOB 1: Las mismas validaciones que CI
  # ─────────────────────────────────────────────
  validacion:
    name: Compilación, análisis y pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Análisis de código (flake8)
        run: |
          make install-dev || pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,test_main.py

      - name: Pruebas y cobertura
        run: |
          pip install pytest pytest-cov
          pytest test_main.py -v \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ─────────────────────────────────────────────
  # JOB 2: Despliegue a PRE
  # ─────────────────────────────────────────────
  despliegue-pre:
    name: Despliegue a PRE
    runs-on: ubuntu-latest
    needs: [validacion, resolver-ips]
    environment: pre

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ needs.resolver-ips.outputs.ip_pre }} >> ~/.ssh/known_hosts

      - name: Copiar código a la VM de PRE
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ needs.resolver-ips.outputs.ip_pre }}:/opt/microservicio/

      - name: Instalar dependencias y reiniciar servicio en PRE
        run: |
          ssh -i ~/.ssh/id_rsa_tfg azureuser@${{ needs.resolver-ips.outputs.ip_pre }} << 'EOF'
            cd /opt/microservicio
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart microservicio
            sudo systemctl status microservicio
          EOF

  # ─────────────────────────────────────────────
  # JOB 3: Pruebas de integración en PRE
  # ─────────────────────────────────────────────
  pruebas-integracion:
    name: Pruebas de integración en PRE
    runs-on: ubuntu-latest
    needs: [despliegue-pre, resolver-ips]
    environment: pre 
    steps:
      - name: Esperar a que el servicio arranque
        run: sleep 10

      - name: Health check PRE
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ needs.resolver-ips.outputs.ip_pre }}:8000/health

      - name: Prueba de integración — crear item
        run: |
          curl --fail -X POST \
            http://${{ needs.resolver-ips.outputs.ip_pre }}:8000/items \
            -H "Content-Type: application/json" \
            -d '{"nombre":"test-integracion","precio":1.0}'

      - name: Prueba de integración — listar items
        run: |
          curl --fail http://${{ needs.resolver-ips.outputs.ip_pre }}:8000/items

  # ─────────────────────────────────────────────
  # JOB 4: Validación humana (aprobación manual)
  # ─────────────────────────────────────────────
  aprobacion-pro:
    name: Aprobación manual para PRO
    runs-on: ubuntu-latest
    needs: pruebas-integracion
    environment: pro          # Entorno de GitHub con "Required reviewers" configurado

    steps:
      - name: Aprobación concedida
        run: echo "Despliegue a PRO aprobado. Iniciando..."

  # ─────────────────────────────────────────────
  # JOB 5: Despliegue a PRO
  # ─────────────────────────────────────────────
  despliegue-pro:
    name: Despliegue a PRO
    runs-on: ubuntu-latest
    needs: [aprobacion-pro, resolver-ips]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ needs.resolver-ips.outputs.ip_pro }} >> ~/.ssh/known_hosts

      - name: Copiar código a la VM de PRO
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ needs.resolver-ips.outputs.ip_pro }}:/opt/microservicio/

      - name: Instalar dependencias y reiniciar servicio en PRO
        run: |
          ssh -i ~/.ssh/id_rsa_tfg azureuser@${{ needs.resolver-ips.outputs.ip_pro }} << 'EOF'
            cd /opt/microservicio
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart microservicio
            sudo systemctl status microservicio
          EOF

      - name: Health check PRO
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ needs.resolver-ips.outputs.ip_pro }}:8000/health

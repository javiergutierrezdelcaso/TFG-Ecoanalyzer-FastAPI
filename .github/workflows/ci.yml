name: CI — Validación de Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Compilación, análisis y pruebas
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 💡 SOLUCIÓN: Instalamos pytest-cov aquí para que el comando de abajo funcione
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 fastapi httpx

      - name: Análisis de código (flake8)
        run: |
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,test_main.py

      # El flag --cov=. generará el archivo .coverage obligatoriamente en la raíz
      - name: Pruebas y cobertura de código
        run: |
          python -m pytest test_main.py -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Publicar cobertura en PR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

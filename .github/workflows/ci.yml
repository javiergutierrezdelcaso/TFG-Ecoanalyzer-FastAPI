name: CI — Validación de Pull Request

on:
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "false"
jobs:
  ci:
    name: Compilación, análisis y pruebas
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Python (Sin caché por el error 400)
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias completas + sistema de cobertura
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install fastapi pydantic azure-identity azure-keyvault-secrets uvicorn
          pip install pytest pytest-cov flake8 httpx

      # 4. Análisis estático (Flake8)
      - name: Análisis de código (flake8)
        run: |
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,test_main.py

      # 5. Pruebas y generación de reporte de cobertura (Cambiado a formato XML para asegurar el archivo)
      - name: Pruebas y cobertura de código
        run: |
          python -m pytest test_main.py -v --cov=. --cov-report=xml --cov-report=term-missing

      # 6. Guardar el artefacto de cobertura (Ahora buscará 'coverage.xml')
      - name: Publicar cobertura en PR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

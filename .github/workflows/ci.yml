name: CI — Validación de Pull Request

on:
  pull_request:
    branches:
      - main

# 🤫 Truco definitivo a nivel de sistema para apagar anotaciones de Node deprecado
env:
  ACTIONS_RUNNER_DEBUG: "false"
  ACTIONS_STEP_DEBUG: "false"

jobs:
  ci:
    name: Compilación, análisis y pruebas
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código usando el SHA definitivo para Node 24
      - name: Checkout código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (Libre de warnings)

      # 2. Configurar Python usando el SHA definitivo para Node 24
      - name: Configurar Python 3.11
        uses: actions/setup-python@0b93645e9fae4224ee4ad4a21d493a1d1029267c # v5.3.0
        with:
          python-version: "3.11"

      # 3. Instalar dependencias completas + sistema de cobertura
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install fastapi pydantic azure-identity azure-keyvault-secrets uvicorn
          pip install pytest pytest-cov flake8 httpx

      # 4. Análisis estático (Flake8)
      - name: Análisis de código (flake8)
        run: |
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,test_main.py

      # 5. Pruebas y generación de reporte de cobertura
      - name: Pruebas y cobertura de código
        run: |
          python -m pytest test_main.py -v --cov=. --cov-report=xml --cov-report=term-missing

      # 6. Guardar el artefacto de cobertura usando el SHA definitivo para Node 24
      - name: Publicar cobertura en PR
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7834576b402773 # v4.5.0
        with:
          name: coverage-report
          path: coverage.xml
